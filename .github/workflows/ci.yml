name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  quality-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install -e "physics engine/." || true

      - name: Lint with ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          ruff check .

      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}/physics\ engine/src
        run: |
          python -m pytest -q

  plugin-smoke:
    runs-on: ubuntu-latest
    needs: quality-and-test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run exporter example (writes PLY/JSON)
        env:
          PYTHONPATH: ${{ github.workspace }}/physics\ engine/src
        run: |
          PYTHONPATH="$PYTHONPATH" python "physics engine/examples/export_splats_example.py"

      - name: Verify output files
        run: |
          set -e
          test -f "physics engine/examples/out/example_splats.json"
          test -f "physics engine/examples/out/example_splats.ply"
          head -n 5 "physics engine/examples/out/example_splats.ply" | grep -q "ply"
